name: 🌐 ESP32 Web IDE (Cloudflare Tunnel)

on:
  workflow_dispatch:
    inputs:
      run_hours:
        description: 'Thời gian chạy (giờ)'
        required: true
        default: '6'
        type: choice
        options: ['1', '2', '3', '6']

jobs:
  web-ide:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      WEB_PASSWORD: ${{ secrets.WEB_PASSWORD }}
      WORK_DIR: ${{ github.workspace }}
      PORT: 9999

    steps:
      - name: 📥 Checkout code cần build
        uses: actions/checkout@v4

      - name: ⛔ Kiểm tra đã có mật khẩu chưa
        run: |
          if [ -z "$WEB_PASSWORD" ]; then
            echo "::error::Chưa cấu hình secret WEB_PASSWORD. Vào Settings > Secrets and variables > Actions để thêm."
            exit 1
          fi
          echo "✅ WEB_PASSWORD đã được cấu hình"

      - name: 🐍 Cài Python 3.8 (ESP-IDF v4.1 không tương thích Python mới)
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: 🔧 Cài ESP-IDF v4.1
        run: |
          set -e
          sudo apt update -qq
          sudo apt install -y -qq git wget flex bison gperf python3-pip \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0
          cd "$HOME"
          git clone -b v4.1 --depth 1 --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          IDF_PYTHON_ENV_PATH="$HOME/.espressif/python_env" ./install.sh esp32
          source ./export.sh
          idf.py --version
          echo "✅ ESP-IDF v4.1 đã cài xong"

      - name: 🔍 Build thử trước khi mở web
        run: |
          source "$HOME/esp-idf/export.sh"
          cd "${{ github.workspace }}"
          if [ ! -f CMakeLists.txt ]; then
            echo "⚠️ Chưa có CMakeLists.txt, server sẽ tự tạo project mẫu khi khởi động"
          else
            idf.py -B build set-target esp32 && idf.py -B build build || {
              echo "::warning::Build thử lỗi, nhưng vẫn tiếp tục mở Web IDE để bạn sửa code."
            }
          fi

      - name: 📦 Cài Cloudflared
        run: |
          set -e
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: 🚀 Khởi động Web IDE server
        run: |
          nohup python3 "${{ github.workspace }}/server.py" > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          sleep 3
          echo "--- Server log ---"
          cat /tmp/server.log
          # Kiểm tra server thật sự sống chưa
          if ! curl -sf "http://localhost:${{ env.PORT }}/login.html" > /dev/null; then
            echo "::error::Server không phản hồi trên port ${{ env.PORT }}"
            cat /tmp/server.log
            exit 1
          fi
          echo "✅ Server đang chạy tại port ${{ env.PORT }}"

      - name: 🌍 Mở Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url "http://localhost:${{ env.PORT }}" > /tmp/tunnel.log 2>&1 &
          echo "⏳ Đang tạo tunnel..."

          URL=""
          for i in $(seq 1 20); do
            sleep 3
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$URL" ]; then
              break
            fi
            echo "  Lần thử $i/20..."
          done

          if [ -z "$URL" ]; then
            echo "::error::Không lấy được link Cloudflare Tunnel"
            echo "--- Tunnel log ---"
            cat /tmp/tunnel.log
            exit 1
          fi

          echo ""
          echo "========================================="
          echo "🔗 LINK WEB IDE: $URL"
          echo "🔑 Mật khẩu: đã lưu trong GitHub Secret WEB_PASSWORD"
          echo "========================================="
          echo ""
          echo "Web IDE sẵn sàng, sẽ tự tắt sau ${{ github.event.inputs.run_hours }} tiếng..."

      - name: ⏰ Giữ workflow chạy
        run: |
          HOURS="${{ github.event.inputs.run_hours }}"
          MINUTES=$((HOURS * 60))
          for i in $(seq 1 "$MINUTES"); do
            sleep 60
            if ! kill -0 "$(cat /tmp/server.pid)" 2>/dev/null; then
              echo "::error::Server đã bị crash, dừng workflow sớm"
              cat /tmp/server.log
              exit 1
            fi
            echo "⏰ Đã chạy: ${i} / ${MINUTES} phút"
          done
