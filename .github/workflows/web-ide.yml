name: 🌐 ESP32 Web IDE (có mật khẩu)

on:
  workflow_dispatch:
    inputs:
      run_hours:
        description: 'Thời gian chạy (giờ)'
        required: true
        default: '6'
        type: choice
        options: ['1', '2', '3', '6']

jobs:
  web-ide:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      # Đặt secret WEB_PASSWORD trong: Repo Settings → Secrets and variables → Actions
      WEB_PASSWORD: ${{ secrets.WEB_PASSWORD }}
      WORK_DIR: ${{ github.workspace }}

    steps:
      - name: 📥 Checkout code cần build
        uses: actions/checkout@v4

      - name: ⛔ Kiểm tra đã có mật khẩu chưa
        run: |
          if [ -z "$WEB_PASSWORD" ]; then
            echo "::error::Chưa cấu hình secret WEB_PASSWORD. Vào Settings > Secrets and variables > Actions để thêm."
            exit 1
          fi

      - name: 🔧 Cài Arduino CLI + core ESP32
        run: |
          sudo apt update -qq
          sudo apt install -y -qq python3
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s -- -b /usr/local/bin
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          echo "✅ Arduino CLI + esp32 core đã cài xong"

      - name: 📦 Cài Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: 🚀 Khởi động Web IDE server (có xác thực)
        run: |
          python3 "${{ github.workspace }}/server.py" > /tmp/server.log 2>&1 &
          sleep 3
          echo "Server log ban đầu:"
          cat /tmp/server.log

      - name: 🌍 Mở Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 2>&1 | tee /tmp/tunnel.log &
          sleep 15

          URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)

          echo ""
          echo "========================================="
          echo "🔗 LINK WEB IDE: $URL"
          echo "🔑 Mật khẩu: đã lưu trong GitHub Secret WEB_PASSWORD"
          echo "========================================="
          echo ""
          echo "Web IDE sẵn sàng, sẽ tự tắt sau ${{ github.event.inputs.run_hours }} tiếng..."

          HOURS="${{ github.event.inputs.run_hours }}"
          MINUTES=$((HOURS * 60))
          for i in $(seq 1 "$MINUTES"); do
            sleep 60
            echo "⏰ Đã chạy: ${i} / ${MINUTES} phút"
          done
